<!doctype html>
<html>
  <head>
    <title>text-style practice</title>
  </head>
  <body>
    <p style="font-family: Tahoma; font-weight: bold; font-size: 20px">
      This is Tahoma Font
    </p>
    <p style="font-family: Verdana; font-size: 20px; font-weight: bold">
      HTML CSS Course
    </p>
    <p style="font-family: Verdana; font-size: 20px; color: grey">
      Beginner to pro
    </p>
    <p
      style="
        font-family: Verdana;
        font-size: 20px;
        font-weight: bold;
        width: 300px;
      "
    >
      In this course , we'll learn the course required for developers
    </p>
    <button
      style="
        background-color: rgb(46, 164, 79);
        color: white;
        height: 36px;
        width: 120px;
        font-weight: bold;
        border: none;
        border-radius: 6px;
        transition: background-color 0.15s;
      "
    >
      Get Started
    </button>
  </body>
</html>
