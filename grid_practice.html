<!doctype html>
<html>
  <head>
    <title>grid practice problem</title>
  </head>
  <body>
    <div
      style="
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        row-gap: 20px;
        column-gap: 15px;
      "
    >
      <div style="background-color: lightblue">col1</div>
      <div style="background-color: lightpink">col2</div>
      <div style="background-color: lightgreen">col3</div>
      <div style="background-color: lightblue">col4</div>
      <div style="background-color: lightpink">col5</div>
      <div style="background-color: lightgreen">col6</div>
    </div>
  </body>
</html>
